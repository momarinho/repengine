name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-test:
    name: API Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Run Go tests
        env:
          CGO_ENABLED: 0
        run: go test ./...

  api-build:
    name: API Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Build API binary
        env:
          CGO_ENABLED: 0
        run: go build ./cmd/server

  web-check:
    name: Web Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Run Svelte checks
        run: npm run check

  web-build:
    name: Web Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

  migration-smoke:
    name: Migration Smoke Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rep
          POSTGRES_PASSWORD: rep
          POSTGRES_DB: repengine
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rep -d repengine"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgres://rep:rep@127.0.0.1:5432/repengine?sslmode=disable
      JWT_SECRET: ci-secret-key
      APP_ENV: ci
      PORT: 18080

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Run migration smoke test
        env:
          CGO_ENABLED: 0
        run: ./scripts/ci/migration-smoke.sh
