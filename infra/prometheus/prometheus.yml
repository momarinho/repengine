global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: repengine

# -------------------------------------------------------
# Alertmanager configuration (placeholder — add your own)
# -------------------------------------------------------
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# -------------------------------------------------------
# Rule files (placeholder — drop .rules files here)
# -------------------------------------------------------
# rule_files:
#   - /etc/prometheus/rules/*.yml

# -------------------------------------------------------
# Scrape configurations
# -------------------------------------------------------
scrape_configs:

  # Go Fiber API — exposes /metrics when the metrics middleware
  # (e.g. github.com/ansrivas/fiberprometheus) is registered.
  - job_name: api
    static_configs:
      - targets:
          - api:8080
    metrics_path: /metrics
    scrape_interval: 15s

  # Prometheus self-scrape
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
