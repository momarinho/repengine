# ============================================================
# Upstream definitions
# ============================================================
upstream api {
    server api:8080;
    keepalive 32;
}

upstream web {
    server web:3000;
    keepalive 32;
}

# ============================================================
# HTTP — redirect everything to HTTPS
# (ACME /.well-known challenge is allowed through for cert renewal)
# ============================================================
server {
    listen      80;
    server_name _;

    # Allow Let's Encrypt / ACME HTTP-01 challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# HTTPS — main server block
# ============================================================
server {
    listen      443 ssl;
    server_name _;

    # ----------------------------------------------------------
    # TLS configuration
    # ----------------------------------------------------------
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_tickets       off;

    # ----------------------------------------------------------
    # Security headers
    # ----------------------------------------------------------
    add_header X-Frame-Options              "DENY"                             always;
    add_header X-Content-Type-Options       "nosniff"                          always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload" always;
    add_header X-XSS-Protection             "1; mode=block"                    always;

    # ----------------------------------------------------------
    # Gzip compression
    # ----------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # ----------------------------------------------------------
    # Global limits
    # ----------------------------------------------------------
    client_max_body_size 10m;

    # ----------------------------------------------------------
    # API proxy  (/api/* → Go Fiber on api:8080)
    # Note: trailing slash in proxy_pass strips the /api prefix
    # ----------------------------------------------------------
    location /api/ {
        proxy_pass         http://api/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }

    # ----------------------------------------------------------
    # SvelteKit frontend proxy  (/* → Node.js on web:3000)
    # Connection: upgrade is kept so HMR websockets work even in
    # production SSE/streaming scenarios.
    # ----------------------------------------------------------
    location / {
        proxy_pass         http://web;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }
}
