# ============================================================
# Staging Nginx configuration — HTTP only, no TLS redirect.
# Direct access to api (:8080) and web (:3000) is still
# available in the staging compose; nginx is only used when
# needed (e.g. testing proxy behaviour).
# ============================================================

upstream api {
    server api:8080;
    keepalive 32;
}

upstream web {
    server web:3000;
    keepalive 32;
}

server {
    listen      80;
    server_name _;

    # ----------------------------------------------------------
    # Security headers — slightly relaxed for staging
    # (e.g. SAMEORIGIN instead of DENY so iframes work in tests)
    # ----------------------------------------------------------
    add_header X-Frame-Options        "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options "nosniff"                          always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;
    add_header X-XSS-Protection       "1; mode=block"                    always;

    # ----------------------------------------------------------
    # Gzip compression
    # ----------------------------------------------------------
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # ----------------------------------------------------------
    # Global limits
    # ----------------------------------------------------------
    client_max_body_size 10m;

    # ----------------------------------------------------------
    # API proxy  (/api/* → Go Fiber on api:8080)
    # ----------------------------------------------------------
    location /api/ {
        proxy_pass         http://api/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }

    # ----------------------------------------------------------
    # SvelteKit frontend proxy  (/* → Node.js on web:3000)
    # ----------------------------------------------------------
    location / {
        proxy_pass         http://web;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }
}
